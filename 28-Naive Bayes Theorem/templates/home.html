<!DOCTYPE html>
<html>

<head>

<title>Time Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}


.container{

    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;

}


h1{

    text-align:center;
    color:#333;

}


label{

    font-weight:bold;

}


input,select{

    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border-radius:5px;
    border:1px solid #ccc;

}


button{

    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background:#0056b3;

}


.result{

    margin-top:20px;
    padding:15px;
    background:#e8ffe8;
    text-align:center;
    color:green;
    font-size:20px;
    border-radius:5px;

}


.error{

    margin-top:20px;
    color:red;
    text-align:center;

}

</style>

</head>


<body>


<div class="container">


<h1>🍽️ Restaurant Time Prediction</h1>


<form action="/predictdata" method="POST">


<label>Total Bill</label>

<input 
type="number"
step="any"
name="total_bill"
placeholder="Enter total bill"
required>



<label>Tip</label>

<input 
type="number"
step="any"
name="tip"
placeholder="Enter tip amount"
required>



<label>Sex</label>

<select name="sex">

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

</select>




<label>Smoker</label>

<select name="smoker">

<option value="Yes">
Yes
</option>

<option value="No">
No
</option>

</select>




<label>Day</label>

<select name="day">

<option value="Thur">
Thursday
</option>

<option value="Fri">
Friday
</option>

<option value="Sat">
Saturday
</option>

<option value="Sun">
Sunday
</option>

</select>




<label>Number of People</label>

<input
type="number"
name="size"
placeholder="Enter size"
required>



<button type="submit">

Predict Time

</button>


</form>



{% if results %}

<div class="result">

<h3>
Predicted Time : {{results}}
</h3>


<p>
Confidence : {{confidence}} %
</p>


</div>

{% endif %}




{% if error %}

<div class="error">

Error : {{error}}

</div>

{% endif %}



</div>


</body>

</html>
