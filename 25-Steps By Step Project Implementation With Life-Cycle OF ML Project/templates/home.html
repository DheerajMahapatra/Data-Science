<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 40px 0;
        }
        .login-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        input.form-control {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="text-center mb-4">FWI Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <div class="mb-3">
                <input type="text" name="Temperature" class="form-control" placeholder="Temperature" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="RH" class="form-control" placeholder="RH" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="Ws" class="form-control" placeholder="Ws" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="Rain" class="form-control" placeholder="Rain" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="FFMC" class="form-control" placeholder="FFMC" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="DMC" class="form-control" placeholder="DMC" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="ISI" class="form-control" placeholder="ISI" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="Classes" class="form-control" placeholder="Classes" required="required" />
            </div>
            <div class="mb-3">
                <input type="text" name="Region" class="form-control" placeholder="Region" required="required" />
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-large">Predict</button>
        </form>

{% if results %}
<div class="alert alert-success text-center mt-4">

    <h2>
        FWI Prediction:
        <span class="fw-bold">
            {{ results }}
        </span>
    </h2>

</div>
{% endif %}
    </div>

</body>
</html>
